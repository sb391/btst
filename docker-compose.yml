version: "3.9"

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: file:./dev.db
      APP_STORAGE_DIR: /app/storage/uploads
      LLM_PROVIDER: mock
      DEMO_USER_ROLE: ADMIN
      NEXT_PUBLIC_APP_NAME: Invoice Intelligence Workbench
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    command: sh -c "npm run db:push && npm run db:seed && npm run start"
